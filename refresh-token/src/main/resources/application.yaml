spring:
  application:
    name: refresh-token
  data:
    redis:
      host: localhost
      port: 6379
      timeout: 500ms
      connect-timeout: 500ms

management:
  endpoints:
    web:
      exposure:
        include: health,metrics
  endpoint:
    health:
      show-details: always
      show-components: always

app:
  auth:
    secret: 01234567890123456789012345678901
    issuer: refresh-token-app
    access-token-ttl: 15m
    refresh-token-ttl: 14d
    redis-key:
      environment: local
      app-name: ${spring.application.name}
    demo-user:
      username: demo
      password: password

resilience4j:
  circuitbreaker:
    instances:
      redisRefreshTokenStore:
        slidingWindowSize: 4
        minimumNumberOfCalls: 4
        failureRateThreshold: 50
        waitDurationInOpenState: 30s
        recordExceptions:
          - com.refreshtoken.auth.domain.RefreshTokenStoreUnavailableException
          - java.lang.RuntimeException
