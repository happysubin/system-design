spring:
  application:
    name: refresh-token
  data:
    redis:
      host: localhost
      port: 6379

app:
  auth:
    secret: 01234567890123456789012345678901
    issuer: refresh-token-app
    access-token-ttl: 15m
    refresh-token-ttl: 14d
    redis-key:
      environment: local
      app-name: ${spring.application.name}
    demo-user:
      username: demo
      password: password
